spring.application.name=alumni-connect
# Database URL - bsmaa_db is the name we used in the SQL script
spring.datasource.url=jdbc:mysql://localhost:3306/bsmaa_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=MySQL@1234

# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Enable Java 21 Virtual Threads
spring.threads.virtual.enabled=true
# Let Hibernate handle the dialect automatically
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Ensure the database exists!
spring.jpa.properties.hibernate.hbm2ddl.auto=update
