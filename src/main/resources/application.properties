spring.application.name=alumni-connect
server.port=${PORT:8080}

# Database URL - constructed dynamically using Railway environment variables
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:bsmaa_db}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:zobaier1010}

# Dynamic file uploads root directory
app.upload.dir=${APP_UPLOAD_DIR:src/main/resources/static/images/uploads/}
# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Enable Java 21 Virtual Threads
spring.threads.virtual.enabled=true
# Let Hibernate handle the dialect automatically
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Ensure the database exists!
spring.jpa.properties.hibernate.hbm2ddl.auto=update




# Resource handling for dynamic uploads
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/images/uploads

# File size limits (otherwise large profile pics will cause a 500 error)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB