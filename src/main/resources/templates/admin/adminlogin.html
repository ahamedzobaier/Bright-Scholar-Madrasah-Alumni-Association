<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BSMAA</title>
    <link rel="stylesheet" th:href="@{/css/AdminStyle.css}">
    <style>
        .login-body {
            background: linear-gradient(135deg, #002147 0%, #00152e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-card h2 {
            color: #002147;
            margin-bottom: 5px;
        }

        .login-card p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-admin-login {
            background: #D4AF37;
            color: #002147;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-admin-login:hover {
            background: #b8962d;
            transform: translateY(-2px);
        }

        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #f5c6cb;
        }

        .logout-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>

<body class="login-body">

    <div class="login-card">
        <h2>BSMAA Admin</h2>
        <p>Enter your credentials to access the backend</p>

        <div th:if="${error}" class="error-msg" th:text="${error}"></div>
        <div th:if="${param.logout}" class="logout-msg">Logged out successfully.</div>

        <form th:action="@{/admin/login}" method="post">
            <div class="form-group">
                <label>Admin Username</label>
                <input type="text" name="username" placeholder="e.g. sakib_admin" required>
            </div>

            <div class="form-group">
                <label>Security Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-admin-login">Login to Backend</button>
        </form>

        <div style="margin-top: 25px;">
            <a href="/" style="color: #002147; text-decoration: none; font-size: 0.8rem;">← Back to Main Website</a>
        </div>
    </div>

</body>

</html>
