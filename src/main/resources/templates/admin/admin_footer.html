<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <footer th:fragment="admin-footer" class="bg-[#1e3a5f] text-slate-400 py-8 mt-auto border-t border-white/10">
        <div class="max-w-7xl mx-auto px-6 lg:px-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="bg-white p-1.5 rounded-lg shadow-md">
                        <span class="text-[#1e3a5f] font-bold text-sm">BSM</span>
                    </div>
                    <div>
                        <h4 class="text-white font-semibold text-sm leading-none">Admin Command Center</h4>

                    </div>
                </div>

                <div class="text-right">
