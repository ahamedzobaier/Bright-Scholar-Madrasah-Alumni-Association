<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<nav th:fragment="navbar"
    class="h-20 bg-[#1e3a5f] shadow-lg sticky top-0 z-50 px-4 lg:px-8 flex items-center justify-between border-b border-white/10">
    <div class="flex items-center gap-4">
        <button id="menu-toggle" onclick="toggleSidebar()"
            class="p-2.5 rounded-xl bg-white/10 text-white hover:bg-amber-500 transition-all">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <div class="flex items-center gap-3">
            <div class="bg-white p-2 rounded-lg rotate-3">
                <span class="text-[#1e3a5f] font-bold text-lg">BSM</span>
            </div>
            <span class="text-white font-serif font-bold text-xl hidden md:block">Admin <span
                    class="text-amber-400">Portal</span></span>
        </div>
    </div>
    <div class="flex items-center gap-4 text-white">
        <div class="text-right hidden sm:block">
            <p class="text-xs font-bold" th:text="${session.loggedInAdmin?.fullName}">Admin Name</p>
            <p class="text-[10px] text-amber-500 uppercase font-bold">System Manager</p>
        </div>
        <div class="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center font-bold">A</div>
    </div>
</nav>

<aside th:fragment="sidebar(activePage)" id="admin-sidebar"
    class="fixed left-0 w-72 bg-[#1e3a5f] text-white border-r border-white/10 overflow-y-auto transition-transform duration-300 -translate-x-full z-40"
    style="top: 80px; height: calc(100vh - 80px);">
    <div class="p-6 flex flex-col h-full">
        <nav class="space-y-2">
            <a th:href="@{/admin/dashboard}" class="flex items-center gap-4 p-4 rounded-xl transition-all"
                th:classappend="${activePage == 'dashboard' ? 'bg-amber-500 text-slate-900 font-bold shadow-lg' : 'text-slate-300 hover:bg-white/5'}">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a th:href="@{/admin/members}" class="flex items-center gap-4 p-4 rounded-xl transition-all"
                th:classappend="${activePage == 'members' ? 'bg-amber-500 text-slate-900 font-bold shadow-lg' : 'text-slate-300 hover:bg-white/5'}">
                <i data-lucide="users" class="w-5 h-5"></i> Members
            </a>
            <a th:href="@{/admin/events}" class="flex items-center gap-4 p-4 rounded-xl transition-all"
                th:classappend="${activePage == 'events' ? 'bg-amber-500 text-slate-900 font-bold shadow-lg' : 'text-slate-300 hover:bg-white/5'}">
                <i data-lucide="calendar" class="w-5 h-5"></i> Events
            </a>
            <a th:href="@{/admin/blogs}" class="flex items-center gap-4 p-4 rounded-xl transition-all"
                th:classappend="${activePage == 'blogs' ? 'bg-amber-500 text-slate-900 font-bold shadow-lg' : 'text-slate-300 hover:bg-white/5'}">
                <i data-lucide="book-open" class="w-5 h-5"></i> Blogs
            </a>
            <hr class="border-white/10 my-4">
            <a th:href="@{/admin/logout}"
                class="flex items-center gap-4 p-4 rounded-xl text-red-400 hover:bg-red-500/10 font-bold">
                <i data-lucide="log-out" class="w-5 h-5"></i> Logout
            </a>
        </nav>
    </div>
</aside>

<div th:fragment="eventModal" id="eventModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 w-full max-w-lg overflow-hidden animate-in fade-in zoom-in duration-200">
        <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
            <div>
                <h3 class="text-xl font-bold text-slate-900">Create New Event</h3>
                <p class="text-xs text-slate-500">Announce a new alumni gathering or workshop</p>
            </div>
            <button onclick="closeEventModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        <form th:action="@{/admin/events/save}" method="post" enctype="multipart/form-data" class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Event Title</label>
                <input type="text" name="title" required placeholder="e.g. Annual Homecoming 2026"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none text-sm transition-all">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Event Date</label>
                    <input type="datetime-local" name="eventDate" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none text-sm transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Location</label>
                    <input type="text" name="location" required placeholder="Auditorium / Zoom"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none text-sm transition-all">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Event Image/Banner</label>
                <input type="file" name="file" accept="image/*"
                    class="w-full px-4 py-2 rounded-xl border border-slate-200 file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200 text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Description</label>
                <textarea name="description" rows="4" required placeholder="Provide details about the event..."
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none text-sm transition-all"></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                <button type="button" onclick="closeEventModal()"
                    class="px-5 py-2.5 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 text-sm transition-all">Cancel</button>
                <button type="submit"
                    class="px-6 py-2.5 rounded-xl font-bold text-white bg-[#1e3a5f] hover:bg-amber-500 hover:text-slate-900 text-sm transition-all shadow-md">Publish Event</button>
            </div>
        </form>
    </div>
</div>

<script th:fragment="eventModalScript">
    function openEventModal() {
        const modal = document.getElementById('eventModal');
        if (modal) {
            modal.classList.remove('hidden');
            lucide.createIcons();
        }
    }
    function closeEventModal() {
        const modal = document.getElementById('eventModal');
        if (modal) {
            modal.classList.add('hidden');
        }
    }
</script>

</html>
