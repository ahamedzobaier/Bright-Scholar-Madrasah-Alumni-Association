<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - BSM Alumni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        .admin-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="admin-gradient min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 bg-amber-500 rounded-2xl flex items-center justify-center mb-4 mx-auto shadow-2xl rotate-3">
                <i data-lucide="shield-check" class="w-10 h-10 text-slate-900"></i>
            </div>
            <h1 class="text-3xl font-serif font-bold text-white tracking-tight">Admin Console</h1>
            <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest">Authorized Access Only</p>
        </div>

        <div class="glass-panel rounded-3xl p-8 shadow-2xl">
            <div th:if="${error}"
                class="mb-6 p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-200 text-xs flex items-center gap-3">
                <i data-lucide="alert-octagon" class="w-4 h-4 text-red-500"></i>
                <span th:text="${error}">Invalid Admin Credentials</span>
            </div>

            <form th:action="@{/admin/login}" method="post" class="space-y-6">
                <div>
                    <label
                        class="block text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Administrator
                        ID</label>
                    <div class="relative">
                        <i data-lucide="key" class="absolute left-4 top-3.5 w-4 h-4 text-slate-500"></i>
                        <input type="text" name="username" required
                            class="w-full pl-12 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition-all placeholder:text-slate-600"
                            placeholder="admin_id">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Secret
                        Key</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-3.5 w-4 h-4 text-slate-500"></i>
                        <input type="password" name="password" required
                            class="w-full pl-12 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition-all placeholder:text-slate-600"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-xl shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2">
                    <i data-lucide="unlock" class="w-4 h-4"></i> Authenticate
                </button>
            </form>
        </div>

        <div class="text-center mt-8">
            <a th:href="@{/home}"
                class="text-slate-500 text-xs hover:text-white transition-colors flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-3 h-3"></i> Return to Main Site
            </a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
