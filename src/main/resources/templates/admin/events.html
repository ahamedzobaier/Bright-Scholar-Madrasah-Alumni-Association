<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Event Management | BSM Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Source Sans Pro', sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar Transition Logic */
        body.sidebar-visible #admin-sidebar {
            transform: translateX(0);
        }

        @media (min-width: 1024px) {
            #main-content {
                transition: margin-left 0.3s ease-in-out;
            }

            body.sidebar-visible #main-content {
                margin-left: 288px;
            }
        }

        [data-lucide] {
            width: 18px !important;
            height: 18px !important;
            display: inline-block;
            stroke: currentColor;
        }
    </style>
</head>

<body class="bg-slate-50">

    <div th:replace="~{admin/fragments :: navbar}"></div>
    <div th:replace="~{admin/fragments :: sidebar('events')}"></div>
    <div th:replace="~{admin/fragments :: eventModal}"></div>

    <div id="main-content" class="min-h-screen flex flex-col">
        <main class="p-4 md:p-8 space-y-6 flex-grow">

            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">Event Management</h1>
                    <p class="text-slate-500 text-sm">Manage all alumni gatherings and workshops.</p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="openEventModal()"
                        class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-semibold flex items-center gap-2 hover:bg-amber-500 hover:text-slate-900 transition-all shadow-sm">
                        <i data-lucide="plus" class="w-5 h-5"></i> Create New Event
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Title</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Date</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Location</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Status</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr th:each="event : ${events}" class="hover:bg-slate-50 transition-colors">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 rounded-lg bg-slate-100 overflow-hidden flex-shrink-0 flex items-center justify-center border border-slate-200">
                                            <img th:if="${event.imageUrl != null}" th:src="${event.imageUrl}" class="w-full h-full object-cover" alt="Event Image"/>
                                            <i th:unless="${event.imageUrl != null}" data-lucide="image" class="w-6 h-6 text-slate-300"></i>
                                        </div>
                                        <div>
                                            <div class="font-bold text-slate-800" th:text="${event.title}">Event Title</div>
                                            <div class="text-xs text-slate-400 truncate w-48" th:text="${event.description}">Desc</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-sm text-slate-600">
                                    <span th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy')}">Date</span>
                                </td>
                                <td class="px-6 py-4 text-sm text-slate-600" th:text="${event.location}">Location</td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase"
                                        th:classappend="${event.status == 'UPCOMING' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}"
                                        th:text="${event.status}">Status</span>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <div class="flex justify-end gap-2">
                                        <a href="#" class="p-2 text-slate-400 hover:text-amber-600" title="Edit">
                                            <i data-lucide="edit" class="w-4 h-4"></i>
                                        </a>
                                        <a href="#" class="p-2 text-slate-400 hover:text-red-600" title="Delete">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${events == null or events.empty}">
                                <td colspan="5" class="px-6 py-20 text-center">
                                    <div class="flex flex-col items-center gap-2">
                                        <i data-lucide="inbox" class="w-12 h-12 text-slate-200"></i>
                                        <p class="text-slate-400 font-medium">No events published yet.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <footer class="p-6 text-center text-slate-400 text-xs border-t border-slate-200 bg-white">
            © 2026 BSM Alumni Association • Moderation Portal
        </footer>
    </div>

    <script th:replace="~{admin/fragments :: eventModalScript}"></script>
    <script>
        // Sidebar Toggle
        function toggleSidebar() {
            document.body.classList.toggle('sidebar-visible');
        }

        lucide.createIcons();
    </script>
</body>

</html>
