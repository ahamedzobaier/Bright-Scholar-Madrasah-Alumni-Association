<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Member Management | BSM Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Source Sans Pro', sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar Transition Logic */
        body.sidebar-visible #admin-sidebar {
            transform: translateX(0);
        }

        @media (min-width: 1024px) {
            #main-content {
                transition: margin-left 0.3s ease-in-out;
            }

            body.sidebar-visible #main-content {
                margin-left: 288px;
            }
        }

        /* Modal Visibility */
        #editModal.hidden {
            display: none;
        }

        /* UI Enhancements */
        .lucide {
            stroke-width: 2.5;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        /* Force icons to have dimensions */
        [data-lucide] {
            width: 18px !important;
            height: 18px !important;
            display: inline-block;
            stroke: currentColor;
            /* Inherits text-blue-600 or text-red-500 */
        }
    </style>
</head>

<body class="bg-slate-50">

    <div th:replace="~{admin/fragments :: navbar}"></div>
    <div th:replace="~{admin/fragments :: sidebar('members')}"></div>

    <div id="main-content" class="min-h-screen flex flex-col">
        <main class="p-4 md:p-8 space-y-6 flex-grow">

            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">Member Directory</h1>
                    <p class="text-slate-500 text-sm">Manage alumni profiles, update departments, or remove accounts.
                    </p>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">User Profile</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Department</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr th:each="user : ${users}" class="hover:bg-slate-50/80 transition-colors group">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div
                                            class="w-10 h-10 rounded-full bg-[#1e3a5f] text-white flex items-center justify-center font-bold shadow-inner">
                                            <span
                                                th:text="${#strings.substring(user.username,0,1).toUpperCase()}">U</span>
                                        </div>
                                        <div>
                                            <div class="font-bold text-slate-900" th:text="${user.username}">Name</div>
                                            <div class="text-xs text-slate-500" th:text="${user.email}">Email</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-semibold"
                                        th:text="${user.department ?: 'Not Assigned'}">Dept</span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right">
                                    <div class="flex items-center justify-end gap-3">
                                        <button type="button" th:data-id="${user.userId}"
                                            th:data-username="${user.username}"
                                            th:data-dept="${user.department ?: 'CSE'}" onclick="openEditModal(this)"
                                            class="flex items-center justify-center w-9 h-9 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                                        </button>

                                        <form th:action="@{/admin/users/delete}" method="post"
                                            onsubmit="return confirm('Are you sure you want to permanently delete this member?');"
                                            class="inline-block">
                                            <input type="hidden" name="userId" th:value="${user.userId}">
                                            <button type="submit"
                                                class="flex items-center justify-center w-9 h-9 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all shadow-sm">
                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="editModal"
        class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 transform transition-all scale-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-900">Edit Member</h2>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form th:action="@{/admin/users/update}" method="post" class="space-y-5">
                <input type="hidden" id="editUserId" name="userId">

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Full Username</label>
                    <input type="text" id="editUsername" name="username" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Department</label>
                    <select id="editDept" name="department"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <option value="CSE">CSE</option>
                        <option value="BBA">BBA</option>
                        <option value="EEE">EEE</option>
                        <option value="ENG">English</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeEditModal()"
                        class="flex-grow py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors">Cancel</button>
                    <button type="submit"
                        class="flex-grow py-3 rounded-xl font-bold text-white bg-[#1e3a5f] hover:bg-amber-500 hover:text-slate-900 transition-all shadow-lg">
                        Update Member
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${message}" id="toast"
        class="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl z-[110] animate-bounce-in flex items-center gap-3">
        <div class="bg-amber-500 p-1 rounded-full">
            <i data-lucide="check" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-bold" th:text="${message}">Action Success!</span>
    </div>

    <script>
        // Initializing Lucide Icons
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // Auto-hide toast
            const toast = document.getElementById('toast');
            if (toast) {
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => toast.classList.add('hidden'), 500);
                }, 4000);
            }
        });

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-visible');
        }

        const modal = document.getElementById('editModal');

        function openEditModal(button) {
            // Read data from the button's data attributes
            const id = button.getAttribute('data-id');
            const name = button.getAttribute('data-username');
            const dept = button.getAttribute('data-dept');

            // Set form values
            document.getElementById('editUserId').value = id;
            document.getElementById('editUsername').value = name;
            document.getElementById('editDept').value = dept;

            // Display modal
            modal.classList.remove('hidden');
        }

        function closeEditModal() {
            modal.classList.add('hidden');
        }

        // Close modal if clicking outside the white box
        window.onclick = function (event) {
            if (event.target == modal) {
                closeEditModal();
            }
        }
    </script>
</body>

</html>
