<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Event | BSM Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Source Sans Pro', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50">

    <div th:replace="~{admin/fragments :: navbar}"></div>
    <div th:replace="~{admin/fragments :: sidebar('events')}"></div>

    <div id="main-content" class="min-h-screen p-4 md:p-8">
        <div class="max-w-3xl mx-auto">
            <nav class="flex mb-4 text-sm text-slate-500">
                <a th:href="@{/admin/dashboard}" class="hover:text-blue-600">Dashboard</a>
                <span class="mx-2">/</span>
                <span class="text-slate-900 font-bold">New Event</span>
            </nav>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-8 border-b border-slate-100 bg-slate-50/50">
                    <h1 class="text-2xl font-bold text-slate-900">Create New Event</h1>
                    <p class="text-slate-500">Fill in the details to announce a new alumni gathering.</p>
                </div>

                <form th:action="@{/admin/events/save}" th:object="${event}" method="post" class="p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">Event Title</label>
                            <input type="text" th:field="*{title}" required
                                placeholder="e.g. Annual Alumni Homecoming 2026"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Event Date</label>
                            <input type="datetime-local" th:field="*{eventDate}" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Location</label>
                            <input type="text" th:field="*{location}" required placeholder="Auditorium / Zoom"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">Description</label>
                            <textarea th:field="*{description}" rows="4" required
                                placeholder="Tell everyone what the event is about..."
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                        </div>
                    </div>

                    <div class="flex items-center justify-end gap-4 pt-4 border-t border-slate-100">
                        <a th:href="@{/admin/dashboard}"
                            class="px-6 py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-all">Cancel</a>
                        <button type="submit"
                            class="px-8 py-3 rounded-xl font-bold text-white bg-[#1e3a5f] hover:bg-amber-500 hover:text-slate-900 transition-all shadow-lg shadow-blue-900/20">
                            Publish Event
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
