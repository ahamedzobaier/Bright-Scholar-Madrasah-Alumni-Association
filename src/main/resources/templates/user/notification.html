<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{user/fragments/layout :: main-layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Notifications - BSM Alumni</title>
</head>

<body>
    <section class="max-w-4xl mx-auto py-12 px-4">

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-[#1e3a5f] font-serif">Your Notifications</h1>
                <p class="text-slate-500 text-sm mt-1">Stay updated with the latest community activities.</p>
            </div>

            <form th:action="@{/notifications/mark-all-read}" method="post"
                th:if="${not #lists.isEmpty(notifications)}">
                <button type="submit"
                    class="flex items-center gap-2 px-4 py-2 text-sm font-bold text-amber-600 hover:bg-amber-50 rounded-lg transition-colors border border-amber-200">
                    <i data-lucide="check-check" class="w-4 h-4"></i>
                    Mark all as read
                </button>
            </form>
        </div>

        <div class="space-y-4">
            <div th:if="${#lists.isEmpty(notifications)}"
                class="bg-white border-2 border-dashed border-slate-200 rounded-2xl py-16 text-center">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="bell-off" class="w-8 h-8 text-slate-400"></i>
                </div>
                <p class="text-slate-500 font-medium">No new notifications at this time.</p>
                <a th:href="@{/}" class="text-amber-600 text-sm font-bold mt-2 inline-block hover:underline">Return to
                    Home</a>
            </div>

            <div th:each="n : ${notifications}"
                th:classappend="${n.isRead} ? 'bg-white border-slate-200' : 'bg-blue-50/50 border-blue-200 shadow-sm'"
                class="group relative flex items-start gap-4 p-5 rounded-xl border transition-all hover:shadow-md">

                <div class="mt-1">
                    <div th:if="${!n.isRead}" class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-pulse"></div>
                    <i th:if="${n.isRead}" data-lucide="bell" class="w-5 h-5 text-slate-300"></i>
                </div>

                <div class="flex-grow">
                    <p class="text-slate-800 leading-relaxed" th:text="${n.message}">
                        Your blog post has been approved and is now live!
                    </p>
                    <div class="flex items-center gap-4 mt-2">
                        <span class="text-xs font-semibold text-slate-400 flex items-center gap-1">
                            <i data-lucide="clock" class="w-3 h-3"></i>
                            <span th:text="${#temporals.format(n.createdAt, 'dd MMM, HH:mm')}">Just now</span>
                        </span>

                        <form th:if="${!n.isRead}" th:action="@{/notifications/read/{id}(id=${n.id})}" method="post">
                            <button type="submit"
                                class="text-[10px] uppercase tracking-wider font-bold text-blue-600 hover:text-blue-800">
                                Mark as read
                            </button>
                        </form>
                    </div>
                </div>

                <button
                    class="opacity-0 group-hover:opacity-100 p-2 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-lg transition-all">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </section>
</body>

</html>
