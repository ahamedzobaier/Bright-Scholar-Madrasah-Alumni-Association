<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{user/fragments/layout :: main-layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Event Detail - BSM Alumni</title>
</head>

<body>
    <section class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        <div class="mb-8">
            <a th:href="@{/event}"
                class="text-[#1e3a5f] hover:text-amber-500 font-bold flex items-center gap-2 mb-6 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Events
            </a>

            <!-- Event Banner Image -->
            <div class="w-full h-80 bg-slate-200 rounded-3xl overflow-hidden mb-8 relative shadow-lg">
                <img th:if="${event.imageUrl != null}" th:src="${event.imageUrl}"
                    class="w-full h-full object-cover"
                    alt="Event Image">

                <div th:unless="${event.imageUrl != null}"
                    class="w-full h-full flex items-center justify-center bg-gradient-to-br from-[#1e3a5f] to-slate-700">
                    <i data-lucide="image" class="w-20 h-20 text-white/20"></i>
                </div>

                <div class="absolute top-6 left-6 bg-white rounded-2xl p-3 shadow-xl text-center min-w-[80px] border border-slate-100">
                    <span class="block text-3xl font-black text-[#1e3a5f] leading-none"
                        th:text="${#temporals.format(event.eventDate, 'dd')}">15</span>
                    <span class="block text-xs uppercase font-extrabold text-amber-600 tracking-widest mt-1"
                        th:text="${#temporals.format(event.eventDate, 'MMM')}">MAR</span>
                </div>
            </div>

            <div class="flex items-center gap-2 mb-4">
                <span
                    class="px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-[10px] font-bold uppercase tracking-wider"
                    th:text="${event.status}">UPCOMING</span>
            </div>

            <h1 class="text-4xl md:text-5xl font-bold text-[#1e3a5f] font-serif leading-tight mb-6"
                th:text="${event.title}">Event Title</h1>

            <div class="grid sm:grid-cols-2 gap-4 p-6 bg-slate-50 rounded-2xl border border-slate-100 mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#1e3a5f]/10 rounded-xl flex items-center justify-center text-[#1e3a5f]">
                        <i data-lucide="map-pin" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Location</p>
                        <p class="text-sm font-bold text-slate-800" th:text="${event.location}">Event Location</p>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-500/10 rounded-xl flex items-center justify-center text-amber-600">
                        <i data-lucide="clock" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Time</p>
                        <p class="text-sm font-bold text-slate-800" th:text="${#temporals.format(event.eventDate, 'hh:mm a')}">Event Time</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="prose max-w-none text-slate-700 leading-relaxed text-lg whitespace-pre-wrap font-sans"
            th:text="${event.description}">
            Event description...
        </div>
    </section>
</body>

</html>
