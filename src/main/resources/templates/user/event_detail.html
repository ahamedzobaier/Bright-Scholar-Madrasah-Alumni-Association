<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{user/fragments/layout :: main-layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title th:text="${event.title} + ' - BSM Alumni'"></title>
</head>

<body>
    <section class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        <div class="mb-8">
            <a th:href="@{/event}"
                class="text-[#1e3a5f] hover:text-amber-500 font-bold flex items-center gap-2 mb-6 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Events
            </a>

            <div class="aspect-video w-full overflow-hidden bg-slate-100 rounded-3xl mb-8 border border-slate-200/60 shadow-inner">
                <img th:if="${event.imageUrl != null}" th:src="${event.imageUrl}" class="w-full h-full object-cover" alt="Event Banner">
                <div th:unless="${event.imageUrl != null}" class="w-full h-full flex items-center justify-center bg-[#1e3a5f]/5 text-[#1e3a5f]/30">
                    <i data-lucide="image" class="w-16 h-16"></i>
                </div>
            </div>

            <div class="flex items-center gap-2 mb-4">
                <span class="px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-[10px] font-bold uppercase tracking-wider"
                    th:text="${event.status}">UPCOMING</span>
            </div>

            <h1 class="text-4xl font-bold text-[#1e3a5f] font-serif leading-tight mb-6"
                th:text="${event.title}">Event Title</h1>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-8 border-b border-slate-200 text-slate-600 font-semibold mb-8">
                <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="p-2.5 bg-amber-100 text-amber-700 rounded-xl">
                        <i data-lucide="calendar" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest leading-none mb-1 font-bold">Event Date</p>
                        <p class="text-slate-800 text-sm" th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy, hh:mm a')}">Date</p>
                    </div>
                </div>

                <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="p-2.5 bg-blue-100 text-[#1e3a5f] rounded-xl">
                        <i data-lucide="map-pin" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest leading-none mb-1 font-bold">Location</p>
                        <p class="text-slate-800 text-sm" th:text="${event.location}">Location</p>
                    </div>
                </div>
            </div>

            <div class="prose max-w-none text-slate-700 leading-relaxed text-lg whitespace-pre-wrap font-sans"
                th:text="${event.description}">
                Event description...
            </div>
        </div>
    </section>
</body>

</html>
