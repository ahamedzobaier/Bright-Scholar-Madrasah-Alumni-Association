<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BSM Alumni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        .bg-pattern {
            background-color: #1e3a5f;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a227' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>

<body class="bg-pattern min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">

        <div class="md:w-1/3 bg-slate-900 p-10 text-white border-b-8 md:border-b-0 md:border-r-8 border-amber-500">
            <div class="w-12 h-12 bg-amber-500 rounded-lg flex items-center justify-center mb-6">
                <span class="text-slate-900 font-bold text-xl">BSM</span>
            </div>
            <h2 class="text-2xl font-serif font-bold mb-4">Create Account</h2>
            <p class="text-slate-400 text-sm leading-relaxed mb-6">Join 500+ alumni already connected to the Bright
                Scholar network.</p>

            <div class="space-y-4">
                <div class="flex items-center gap-3 text-xs">
                    <i data-lucide="check" class="text-amber-500 w-4 h-4"></i>
                    <span>Profile Verification</span>
                </div>
                <div class="flex items-center gap-3 text-xs">
                    <i data-lucide="check" class="text-amber-500 w-4 h-4"></i>
                    <span>Event Notifications</span>
                </div>
            </div>
        </div>

        <div class="md:w-2/3 p-10">
            <form th:action="@{/signup}" method="post" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Username</label>
                        <input type="text" name="username" required
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Email</label>
                        <input type="email" name="email" required
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Password</label>
                        <input type="password" name="password" required
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Batch</label>
                        <input type="number" name="batch" placeholder="2020" required
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Department</label>
                    <select name="department"
                        class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                        <option value="Science">Science</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Business">Business</option>
                        <option value="Arts">Arts</option>
                    </select>
                </div>

                <button type="submit"
                    class="w-full py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-lg transition-all shadow-lg active:scale-95">
                    Register Now
                </button>
            </form>

            <p class="text-center mt-6 text-sm text-slate-500">
                Already a member? <a th:href="@{/login}" class="text-amber-600 font-bold">Login</a>
            </p>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
