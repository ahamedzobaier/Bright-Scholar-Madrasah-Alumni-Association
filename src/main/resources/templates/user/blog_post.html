<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{user/fragments/layout :: main-layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Alumni Blog - BSM</title>
</head>

<body>
    <section>
        <div class="relative bg-slate-900 py-16 px-4 overflow-hidden">
            <div
                class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">
            </div>
            <div class="max-w-7xl mx-auto relative z-10 text-center">
                <h1 class="text-4xl md:text-5xl font-bold text-white font-serif mb-4">Alumni Stories & Insights</h1>
                <p class="text-slate-300 text-lg mb-8 max-w-2xl mx-auto">Share your professional journey, life
                    experiences, and wisdom with the Bright Scholar community.</p>
                <button onclick="toggleBlogForm()"
                    class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-8 py-3 rounded-xl transition-all shadow-lg flex items-center gap-2 mx-auto">
                    <i data-lucide="pen-tool" class="w-5 h-5"></i>
                    Write a Story
                </button>
            </div>
        </div>

        <div id="blogFormContainer" class="hidden max-w-3xl mx-auto -mt-10 mb-12 relative z-20 px-4">
            <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-[#1e3a5f] font-serif">Submit a New Story</h2>
                    <button onclick="toggleBlogForm()" class="text-slate-400 hover:text-red-500 transition-colors">
                        <i data-lucide="x-circle" class="w-6 h-6"></i>
                    </button>
                </div>
                <form th:action="@{/blog/submit}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Title</label>
                        <input type="text" name="title" placeholder="Give your story a catchy title" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Content</label>
                        <textarea name="content" rows="8" placeholder="What's on your mind? Share your insights here..."
                            required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 focus:outline-none transition-all"></textarea>
                    </div>
                    <button type="submit"
                        class="w-full bg-[#1e3a5f] hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                        Submit for Approval
                    </button>
                </form>
            </div>
        </div>

        <div class="max-w-7xl mx-auto py-16 px-4">
            <div th:if="${#lists.isEmpty(blogs)}"
                class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                <i data-lucide="book-open" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
                <p class="text-slate-500 text-lg">No stories have been published yet. Be the first to share!</p>
            </div>

            <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
                <div th:each="post : ${blogs}"
                    class="bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-xl transition-all group">
                    <div class="p-8">
                        <div class="flex items-center gap-2 mb-4">
                            <span
                                class="px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-[10px] font-bold uppercase tracking-wider"
                                th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy')}">Date</span>
                        </div>

                        <h2 class="text-2xl font-bold text-slate-800 mb-4 group-hover:text-[#1e3a5f] transition-colors leading-tight"
                            th:text="${post.title}">Post Title</h2>

                        <p class="text-slate-600 text-sm leading-relaxed mb-6 line-clamp-3"
                            th:text="${#strings.abbreviate(post.content, 150)}">
                            Short summary of the blog post...
                        </p>

                        <div class="flex items-center justify-between pt-6 border-t border-slate-50">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center">
                                    <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                                </div>
                                <span class="text-xs font-bold text-slate-700"
                                    th:text="${post.authorName}">Author</span>
                            </div>
                            <a th:href="@{/blog/view/{id}(id=${post.id})}"
                                class="text-[#1e3a5f] text-sm font-bold flex items-center gap-1 hover:gap-2 transition-all">
                                Read More <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function toggleBlogForm() {
                const container = document.getElementById('blogFormContainer');
                container.classList.toggle('hidden');
                if (!container.classList.contains('hidden')) {
                    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        </script>
    </section>
</body>

</html>
