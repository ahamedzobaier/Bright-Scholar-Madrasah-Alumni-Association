<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{user/fragments/layout :: main-layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Profile - BSM Alumni</title>
</head>

<body>
    <section
        class="max-w-4xl mx-auto mt-12 mb-12 p-8 bg-white rounded-2xl shadow-xl border border-slate-200 animate-fade-in">

        <div class="flex flex-col sm:flex-row items-center gap-8 mb-10 border-b border-slate-100 pb-10">
            <div
                class="w-32 h-32 bg-slate-100 rounded-full flex items-center justify-center overflow-hidden border-4 border-amber-500/20 shadow-inner relative">
                <img th:if="${user.profilePicUrl != null}" th:src="${user.profilePicUrl}" class="w-full h-full object-cover" alt="Profile Picture">
                <i th:unless="${user.profilePicUrl != null}" data-lucide="user" class="w-16 h-16 text-slate-300"></i>
            </div>
            <div class="text-center sm:text-left">
                <h1 class="text-4xl font-bold text-[#1e3a5f] font-serif mb-2" th:text="${user.username}">Username</h1>
                <p class="text-slate-500 font-sans flex items-center justify-center sm:justify-start gap-2">
                    <i data-lucide="mail" class="w-4 h-4"></i>
                    <span th:text="${user.email}">email@example.com</span>
                </p>
                <div class="mt-4 flex flex-wrap justify-center sm:justify-start gap-2">
                    <span
                        class="px-4 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold tracking-wide uppercase"
                        th:text="${user.status}">APPROVED</span>
                    <span
                        class="px-4 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-bold tracking-wide uppercase"
                        th:text="${user.accountType}">ALUMNI</span>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-10">
            <div class="space-y-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-amber-500 rounded-lg">
                        <i data-lucide="graduation-cap" class="w-5 h-5 text-white"></i>
                    </div>
                    <h3 class="font-bold text-xl text-slate-800 font-serif">Education</h3>
                </div>
                <div class="bg-slate-50 p-5 rounded-xl border border-slate-100 space-y-3">
                    <p class="text-sm flex justify-between">
                        <span class="text-slate-500 font-semibold uppercase tracking-tighter">Batch</span>
                        <span class="text-slate-900 font-bold" th:text="${user.batch}">2018</span>
                    </p>
                    <p class="text-sm flex justify-between">
                        <span class="text-slate-500 font-semibold uppercase tracking-tighter">Department</span>
                        <span class="text-slate-900 font-bold" th:text="${user.department}">Computer Science</span>
                    </p>
                </div>
            </div>

            <div class="space-y-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-[#1e3a5f] rounded-lg">
                        <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
                    </div>
                    <h3 class="font-bold text-xl text-slate-800 font-serif">Account Details</h3>
                </div>
                <div class="bg-slate-50 p-5 rounded-xl border border-slate-100 space-y-3">
                    <p class="text-sm flex justify-between">
                        <span class="text-slate-500 font-semibold uppercase tracking-tighter">Member Since</span>
                        <span class="text-slate-900 font-bold" th:text="${user.createdAt}">March 2026</span>
                    </p>
                    <p class="text-sm flex justify-between">
                        <span class="text-slate-500 font-semibold uppercase tracking-tighter">Verification</span>
                        <span class="text-blue-600 font-bold flex items-center gap-1">
                            Verified <i data-lucide="check-circle" class="w-3 h-3"></i>
                        </span>
                    </p>
                </div>
            </div>
        </div>

        <div class="mt-12 flex justify-end gap-4 border-t border-slate-100 pt-8">
            <button onclick="openEditModal()"
                class="flex items-center gap-2 px-6 py-2 border-2 border-slate-200 text-slate-600 hover:bg-slate-50 font-bold rounded-xl transition-all">
                <i data-lucide="edit-3" class="w-4 h-4"></i> Edit Profile
            </button>
        </div>
    </section>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl border border-slate-200 shadow-2xl max-w-md w-full overflow-hidden animate-fade-up">
            <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                <h2 class="text-xl font-bold text-[#1e3a5f] font-serif">Edit Profile</h2>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form th:action="@{/profile/update}" method="post" enctype="multipart/form-data" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" th:value="${user.email}" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-wider">Batch</label>
                    <input type="number" name="batch" th:value="${user.batch}" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-wider">Department</label>
                    <select name="department"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm">
                        <option value="Science" th:selected="${user.department == 'Science'}">Science</option>
                        <option value="Engineering" th:selected="${user.department == 'Engineering'}">Engineering</option>
                        <option value="Business" th:selected="${user.department == 'Business'}">Business</option>
                        <option value="Arts" th:selected="${user.department == 'Arts'}">Arts</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-wider">Profile Picture</label>
                    <input type="file" name="profilePicFile" accept="image/*"
                        class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none text-xs file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200">
                </div>

                <button type="submit"
                    class="w-full bg-[#1e3a5f] hover:bg-amber-500 hover:text-slate-900 text-white font-bold py-3.5 rounded-xl transition-all shadow-md mt-4">
                    Save Changes
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notification th:if="${message}" -->
    <div th:if="${message}" id="toast"
        class="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl z-[100] flex items-center gap-3 animate-bounce">
        <i data-lucide="info" class="w-5 h-5 text-amber-400"></i>
        <span class="text-sm font-bold" th:text="${message}">Action Successful!</span>
    </div>

    <script>
        function openEditModal() {
            document.getElementById('editModal').classList.remove('hidden');
        }
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }
        
        // Auto-hide toast after 4 seconds
        setTimeout(() => {
            const toast = document.getElementById('toast');
            if (toast) toast.style.display = 'none';
        }, 4000);
    </script>
</body>

</html>
