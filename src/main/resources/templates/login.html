<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/Login.css}">
    <title th:text="${pageTitle}">Login | BSMAA</title>
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <a href="/"><img th:src="@{/images/logo.jpeg}" alt="BSM Logo" class="login-logo"></a>
                <h2>Alumni Portal Login</h2>
            </div>

            <div th:if="${error}" class="error-alert">
                <p th:text="${error}"></p>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username"
                        autofocus>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="login-btn">Sign In</button>

                <div class="form-footer">
                    <a href="#">Forgot Password?</a>
                    <hr>
                    <span>Not a member? <a th:href="@{/register}">Contact Admin</a></span>
                    <br><br>
                    <a th:href="@{/}" style="font-size: 0.8rem; color: #666;">← Back to Home</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
